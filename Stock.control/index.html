<!DOCTYPE html>
<html lang="km">
<head>
    <link rel="icon" type="image/jpeg" href="image/Logo.JPG">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងស្តុក និងលក់ទំនិញ - NH បោះដុំអាហារ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header ថ្មី៖ ប្រើរូបភាពលាតពេញផ្ទៃ (លុបអក្សរកូដចាស់) -->
    <header class="main-header no-print">
        <img src="image/header.png" alt="NH បោះដុំអាហារ Banner" class="header-banner-img">
    </header>

    <div class="main-container">
        <!-- Sidebar ម៉ឺនុយចំហៀង (រក្សាតាមកូដដើមបងទាំងស្រុង) -->
        <aside class="sidebar no-print">
            <nav>
                <a href="#" class="menu-item active" data-page="stock-in">
                    <img src="image/in-stock.png" class="menu-icon"> <span>ទំនិញចូលស្តុក</span>
                </a>
                <a href="#" class="menu-item" data-page="stock-out">
                    <img src="image/out-of-stock.png" class="menu-icon"> <span>ទំនិញលក់ចេញ</span>
                </a>
                <a href="#" class="menu-item" data-page="report">
                    <img src="image/report.png" class="menu-icon"> <span>របាយការណ៍ </span>
                </a>
            </nav>
        </aside>

        <!-- ផ្ទាំងបង្ហាញទិន្នន័យ -->
        <main class="content-area" id="content-area">
            <!-- រត់ទិន្នន័យស្វ័យប្រវត្តដោយ script.js -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
